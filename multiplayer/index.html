<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>俄羅斯方塊 — 雙人對戰</title>
    <style>
        /* ============ RESET & BASE ============ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a2e;
            --bg-gradient: linear-gradient(135deg, #0a0a2e, #1a1a4e, #0f0f3e);
            --surface: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --text: #e8e8e8;
            --text-dim: rgba(255, 255, 255, 0.55);
            --accent: #00d4ff;
            --accent-glow: 0 0 20px rgba(0, 212, 255, 0.35);
            --success: #00ff87;
            --warning: #f5c542;
            --error: #ff4757;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        /* ============ LANDING PAGE ============ */
        #landing-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 1.5rem;
        }

        .logo {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #c44dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
        }

        .logo-sub {
            color: var(--text-dim);
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            margin-bottom: 2.5rem;
        }

        .mode-cards {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 500px;
            width: 100%;
        }

        .mode-card {
            flex: 1 1 200px;
            max-width: 240px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .mode-card:hover, .mode-card:active {
            border-color: var(--accent);
            box-shadow: var(--accent-glow);
            transform: translateY(-2px);
        }

        .mode-icon { font-size: 2rem; margin-bottom: 0.6rem; }
        .mode-card h3 { font-size: 1.15rem; margin-bottom: 0.3rem; }
        .mode-card p { color: var(--text-dim); font-size: 0.8rem; line-height: 1.4; }

        /* Join form inline */
        .join-form-inline {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            margin-top: 1.2rem;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            max-width: 320px;
            width: 100%;
        }
        .join-form-inline.active { display: flex; }

        .join-form-inline h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .form-row {
            display: flex;
            gap: 0.5rem;
            width: 100%;
        }

        .form-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.55rem 0.7rem;
            color: var(--text);
            font-size: 1rem;
            text-transform: uppercase;
            font-family: monospace;
            letter-spacing: 2px;
            text-align: center;
        }
        .form-input:focus { outline: none; border-color: var(--accent); }

        .form-btn {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #0a0a2e;
            font-weight: 600;
            padding: 0.55rem 1.1rem;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* ============ GAME PAGE ============ */
        #game-page {
            display: none;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        #game-page.active { display: flex; }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .room-info {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .room-code {
            color: var(--accent);
            font-weight: 600;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .status-text {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: var(--surface);
        }

        /* Game area — scrolls vertically if needed */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0.5rem;
            gap: 0.4rem;
        }

        /* Stats row above board */
        .stats-above {
            display: flex;
            gap: 1.5rem;
            font-size: 0.8rem;
            justify-content: center;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.15rem; font-weight: 700; color: var(--success); }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* Main layout: board + side panels */
        .board-layout {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: nowrap;
        }

        /* Side panels (Hold / Next) */
        .side-col {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            flex-shrink: 0;
        }

        .preview-box {
            text-align: center;
        }
        .preview-label {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.2rem;
        }
        .preview-box canvas {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        /* Main board canvas */
        #mp-canvas {
            border: 2px solid var(--accent);
            border-radius: 6px;
            box-shadow: var(--accent-glow);
            flex-shrink: 0;
        }

        /* Opponent panel */
        .opponent-panel {
            text-align: center;
        }
        .opponent-panel .mini-title {
            font-size: 0.7rem;
            color: var(--error);
            margin-bottom: 0.2rem;
        }
        #opponent-canvas {
            border: 1px solid rgba(255, 71, 87, 0.25);
            border-radius: 4px;
        }

        /* ============ TOUCH CONTROLS ============ */
        .touch-controls {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.4rem;
            width: 100%;
            max-width: 400px;
            margin-top: 0.3rem;
        }

        .ctrl-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1.1rem;
            height: 48px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:active {
            background: var(--accent);
            color: #0a0a2e;
            box-shadow: var(--accent-glow);
        }
        .ctrl-btn.wide {
            grid-column: span 5;
            max-width: 400px;
        }

        /* Messages */
        .message-box {
            background: var(--error);
            color: #fff;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 0.3rem;
            display: none;
            text-align: center;
        }

        /* Settings */
        .settings-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-top: 1rem;
        }
        .settings-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            max-width: 340px;
            width: 100%;
            display: none;
            margin-top: 0.75rem;
        }
        .settings-panel.active { display: block; }
        .settings-panel h3 {
            font-size: 0.9rem;
            margin-bottom: 0.6rem;
            text-align: center;
        }
        .config-row { margin-bottom: 0.5rem; }
        .config-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-bottom: 0.2rem;
            display: block;
        }
        .config-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem 0.5rem;
            color: var(--text);
            font-size: 0.7rem;
            font-family: monospace;
        }
        .config-input:focus { outline: none; border-color: var(--accent); }
        .save-btn {
            background: var(--success);
            border: none;
            border-radius: 6px;
            color: #0a0a2e;
            font-weight: 600;
            padding: 0.45rem 1rem;
            cursor: pointer;
            font-size: 0.75rem;
            width: 100%;
        }
        .config-status {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 0.3rem;
            color: var(--text-dim);
        }

        /* ============ RESPONSIVE ============ */

        /* Desktop: side-by-side layout */
        @media (min-width: 900px) {
            .board-layout {
                flex-direction: row;
            }
            .side-col.left { order: -1; }
            .side-col.right { order: 2; }
            .game-area {
                max-width: 1100px;
                margin: 0 auto;
            }
        }

        /* Mobile / small screens */
        @media (max-width: 600px) {
            .game-area { padding: 0.3rem; gap: 0.25rem; }
            .stats-above { gap: 0.8rem; font-size: 0.7rem; }
            .stat-value { font-size: 1rem; }
            .board-layout { gap: 0.4rem; }
            .touch-controls { max-width: 360px; }
            .ctrl-btn { height: 44px; font-size: 1rem; }
        }
    </style>
</head>
<body data-supabase-url="" data-supabase-anon-key="">
    <!-- ============ LANDING PAGE ============ -->
    <div id="landing-page">
        <div class="logo">俄羅斯方塊</div>
        <div class="logo-sub">雙人線上對戰</div>

        <div class="mode-cards">
            <button class="mode-card" id="mp-create-room" type="button" onclick="window._mpHandleCreateRoom()">
                <div class="mode-icon">🎮</div>
                <h3>創建房間</h3>
                <p>建立新房間，邀請朋友</p>
            </button>
            <button class="mode-card" id="mp-join-card" type="button" onclick="document.getElementById('join-form-inline').classList.add('active'); document.getElementById('mp-room-code-input').focus();">
                <div class="mode-icon">🔗</div>
                <h3>加入房間</h3>
                <p>輸入房間碼加入對局</p>
            </button>
        </div>

        <div class="join-form-inline" id="join-form-inline">
            <h4>加入房間</h4>
            <div class="form-row">
                <input type="text" class="form-input" id="mp-room-code-input" maxlength="6" placeholder="TET7A3" />
                <button class="form-btn" type="button" id="mp-join-btn" onclick="window._mpHandleJoinRoom()">加入</button>
            </div>
        </div>

        <div class="message-box" id="mp-error"></div>

        <p style="margin-top: 1.5rem; font-size: 0.75rem; color: var(--text-dim);">
            <a href="../index.html" style="color: var(--accent); text-decoration: none;">← 返回單人模式</a>
        </p>

        <button class="settings-toggle" id="show-settings-btn">⚙️ 設定 Supabase</button>

        <div class="settings-panel" id="settings-panel">
            <h3>⚙️ Supabase 設定</h3>
            <div class="config-row">
                <label class="config-label">Supabase URL</label>
                <input type="text" class="config-input" id="cfg-url" placeholder="https://xxxxx.supabase.co" />
            </div>
            <div class="config-row">
                <label class="config-label">Anon Key</label>
                <input type="password" class="config-input" id="cfg-key" placeholder="xxxx.yyyyyyyyyyyy" />
            </div>
            <button class="save-btn" id="cfg-save-btn">儲存並重新載入</button>
            <div class="config-status" id="cfg-status"></div>
        </div>
    </div>

    <!-- ============ GAME PAGE ============ -->
    <div id="game-page">
        <div class="top-bar">
            <button class="back-btn" id="mp-back-btn">✕ 返回</button>
            <div class="room-info">房間: <span class="room-code" id="mp-room-display"></span></div>
            <div class="status-text" id="mp-connection-status">等待中...</div>
        </div>

        <div class="message-box" id="mp-message"></div>

        <div class="game-area">
            <!-- Stats row -->
            <div class="stats-above">
                <div class="stat-item">
                    <span class="stat-value" id="mp-score">0</span>
                    <span class="stat-label">分數</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="mp-level">1</span>
                    <span class="stat-label">等級</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="mp-lines">0</span>
                    <span class="stat-label">消行</span>
                </div>
            </div>

            <!-- Board + side panels -->
            <div class="board-layout">
                <!-- Left: Hold + Next -->
                <div class="side-col left">
                    <div class="preview-box">
                        <div class="preview-label">持有</div>
                        <canvas id="hold-piece-canvas" width="80" height="80"></canvas>
                    </div>
                    <div class="preview-box">
                        <div class="preview-label">下一個</div>
                        <canvas id="next-piece-canvas" width="80" height="80"></canvas>
                    </div>
                </div>

                <!-- Center: Main board -->
                <canvas id="mp-canvas" width="300" height="600"></canvas>

                <!-- Right: Opponent -->
                <div class="side-col right">
                    <div class="opponent-panel">
                        <div class="mini-title">對手</div>
                        <canvas id="opponent-canvas" width="160" height="160"></canvas>
                        <div class="stats-above" style="margin-top:0.4rem;">
                            <div class="stat-item">
                                <span class="stat-value" id="mp-other-score" style="font-size:0.95rem;">0</span>
                                <span class="stat-label">分數</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value" id="mp-other-level" style="font-size:0.95rem;">1</span>
                                <span class="stat-label">等級</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Touch controls -->
            <div class="touch-controls">
                <button class="ctrl-btn" id="mp-btn-left">◀</button>
                <button class="ctrl-btn" id="mp-btn-rotate">↻</button>
                <button class="ctrl-btn" id="mp-btn-down">▼</button>
                <button class="ctrl-btn" id="mp-btn-right">▶</button>
                <button class="ctrl-btn" id="mp-btn-hold">H</button>
                <button class="ctrl-btn wide" id="mp-btn-drop">⬇ 硬降</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/sound.js"></script>
    <script src="js/game-core.js"></script>
    <script src="js/room-system.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/garbage-system.js"></script>
    <script src="js/sync-engine.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/multiplayer-ui.js"></script>

    <script>
        (function() {
            const landingPage = document.getElementById('landing-page');
            const gamePage = document.getElementById('game-page');
            const settingsPanel = document.getElementById('settings-panel');
            const showSettingsBtn = document.getElementById('show-settings-btn');
            const cfgUrl = document.getElementById('cfg-url');
            const cfgKey = document.getElementById('cfg-key');
            const cfgSaveBtn = document.getElementById('cfg-save-btn');
            const cfgStatus = document.getElementById('cfg-status');
            const bodyEl = document.body;

            function showLanding() {
                if (landingPage) landingPage.style.display = 'flex';
                if (gamePage) gamePage.style.display = 'none';
            }

            function showGame() {
                if (landingPage) landingPage.style.display = 'none';
                if (gamePage) gamePage.style.display = 'flex';
            }

            const isGamePage = window.location.search.includes('roomCode');

            // Load saved Supabase config from localStorage
            function loadSavedConfig() {
                const savedUrl = localStorage.getItem('supabase-url');
                const savedKey = localStorage.getItem('supabase-key');
                if (savedUrl) {
                    cfgUrl.value = savedUrl;
                    bodyEl.dataset.supabaseUrl = savedUrl;
                }
                if (savedKey) {
                    cfgKey.value = savedKey;
                    bodyEl.dataset.supabaseAnonKey = savedKey;
                }
            }

            if (isGamePage) {
                showGame();
                const params = new URLSearchParams(window.location.search);
                const roomCode = params.get('roomCode');
                const roomDisplay = document.getElementById('mp-room-display');
                if (roomDisplay && roomCode) {
                    roomDisplay.textContent = roomCode;
                }
                const backBtn = document.getElementById('mp-back-btn');
                if (backBtn) {
                    backBtn.addEventListener('click', showLanding);
                }
                MultiplayerGameController.init(null);
            } else {
                showLanding();
                loadSavedConfig();

                if (showSettingsBtn) {
                    showSettingsBtn.addEventListener('click', () => {
                        settingsPanel.classList.toggle('active');
                    });
                }

                if (cfgSaveBtn && cfgUrl && cfgKey && cfgStatus) {
                    cfgSaveBtn.addEventListener('click', () => {
                        const url = cfgUrl.value.trim();
                        const key = cfgKey.value.trim();
                        if (!url || !key) {
                            cfgStatus.textContent = '請填寫完整的 URL 和 Key';
                            cfgStatus.style.color = '#ff4757';
                            return;
                        }
                        localStorage.setItem('supabase-url', url);
                        localStorage.setItem('supabase-key', key);
                        bodyEl.dataset.supabaseUrl = url;
                        bodyEl.dataset.supabaseAnonKey = key;
                        cfgStatus.textContent = '✓ 已儲存！頁面將重新載入。';
                        cfgStatus.style.color = '#00ff87';
                        setTimeout(() => { location.reload(); }, 1000);
                    });
                }

                MultiplayerGameController.init(true);
            }
        })();
    </script>
</body>
</html>
