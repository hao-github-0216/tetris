<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>俄羅斯方塊 — 多人模式</title>
    <style>
        /* ============ RESET & BASE ============ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e8e8e8;
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent: #00d4ff;
            --accent-glow: 0 0 20px rgba(0, 212, 255, 0.4);
            --success: #00ff87;
            --warning: #f5c542;
            --error: #ff4757;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ============ LANDING PAGE ============ */
        #landing-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 2rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #c44dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-shadow: none;
        }

        .logo-sub {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 3rem;
        }

        .mode-cards {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            min-width: 200px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .mode-card:hover {
            border-color: var(--accent);
            box-shadow: var(--accent-glow);
            transform: translateY(-4px);
        }

        .mode-card h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .mode-card p {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .mode-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        /* ============ GAME PAGE ============ */
        #game-page {
            display: none;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 1rem;
        }

        #game-page.active {
            display: flex;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 0.75rem;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .room-info {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .room-code {
            color: var(--accent);
            font-weight: 600;
            font-family: monospace;
        }

        .status-text {
            font-size: 0.8rem;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            background: var(--surface);
        }

        /* Game layout */
        .game-container {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .preview-box {
            text-align: center;
        }

        .preview-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }

        .preview-box canvas {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        /* Main canvas */
        #mp-canvas {
            border: 2px solid var(--accent);
            border-radius: 8px;
            box-shadow: var(--accent-glow);
        }

        /* Opponent mini-board */
        .opponent-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .opponent-panel .mini-title {
            font-size: 0.75rem;
            color: var(--error);
            margin-bottom: 0.3rem;
        }

        #opponent-canvas {
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 4px;
        }

        /* Info row */
        .info-row {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--success);
        }

        .info-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* Touch controls */
        .touch-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0.5rem;
            width: 100%;
            max-width: 280px;
            margin-top: 0.75rem;
        }

        .ctrl-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1.2rem;
            height: 50px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .ctrl-btn:active {
            background: var(--accent);
            color: #fff;
            box-shadow: var(--accent-glow);
        }

        .ctrl-btn.empty {
            visibility: hidden;
        }

        /* Error / Messages */
        .message-box {
            background: var(--error);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            display: none;
            text-align: center;
        }

        /* ============ LOBBY (Create/Join) ============ */
        .lobby-form {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            min-width: 280px;
            margin-top: 1.5rem;
        }

        .lobby-form h3 {
            margin-bottom: 1rem;
            text-align: center;
        }

        .form-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .form-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: var(--text);
            font-size: 1rem;
            text-transform: uppercase;
            font-family: monospace;
            letter-spacing: 2px;
            text-align: center;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-btn {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #0f0c29;
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .form-btn:hover {
            box-shadow: var(--accent-glow);
        }

        /* ============ SETTINGS PANEL ============ */
        .settings-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.2rem;
            min-width: 280px;
            max-width: 340px;
            display: none;
        }
        .settings-panel.active {
            display: block;
        }
        .settings-panel h3 {
            margin-bottom: 0.8rem;
            text-align: center;
            font-size: 0.95rem;
        }
        .config-row {
            margin-bottom: 0.7rem;
        }
        .config-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 0.25rem;
            display: block;
        }
        .config-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.45rem 0.6rem;
            color: var(--text);
            font-size: 0.75rem;
            font-family: monospace;
        }
        .config-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .save-btn {
            background: var(--success);
            border: none;
            border-radius: 8px;
            color: #0f0c29;
            font-weight: 600;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.8rem;
            width: 100%;
        }
        .config-status {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 0.4rem;
            color: var(--text-dim);
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 600px) {
            .logo { font-size: 2rem; }
            .mode-cards { gap: 1rem; }
            .mode-card { min-width: 160px; padding: 1.5rem; }
            .game-container { gap: 0.5rem; }
        }
    </style>
</head>
<body data-supabase-url="" data-supabase-anon-key="">
    <!-- ============ LANDING PAGE ============ -->
    <div id="landing-page">
        <div class="logo">俄羅斯方塊</div>
        <div class="logo-sub">雙人線上對戰</div>

        <div class="mode-cards">
            <div class="mode-card" id="mp-create-room">
                <button onclick="alert('Create Room clicked!');" style="background:none;border:none;color:inherit;font:inherit;cursor:pointer;width:100%;text-align:center;pointer-events:auto;">🎮 創建房間</button>
                <p style="margin:0.3rem 0 0;font-size:0.8rem;color:var(--text-dim);">建立新房間，邀請朋友</p>
            </div>
            <div class="mode-card" id="mp-join-card">
                <button onclick="document.getElementById('mp-room-code-input').focus(); document.getElementById('join-lobby').classList.add('active');" style="background:none;border:none;color:inherit;font:inherit;cursor:pointer;width:100%;text-align:center;pointer-events:auto;">🔗 加入房間</button>
                <p style="margin:0.3rem 0 0;font-size:0.8rem;color:var(--text-dim);">輸入房間碼加入對局</p>
            </div>
        </div>

        <div class="lobby-form" id="join-lobby">
            <h3>加入房間</h3>
            <div class="form-row">
                <input type="text" class="form-input" id="mp-room-code-input" maxlength="6" placeholder="TET7A3" />
                <button class="form-btn" id="mp-join-btn" onclick="handleJoinRoom()">加入</button>
            </div>
        </div>

        <div class="message-box" id="mp-error"></div>

        <p style="margin-top: 2rem; font-size: 0.75rem; color: var(--text-dim);">
            <a href="../index.html" style="color: var(--accent);">← 返回單人模式</a>
        </p>

        <!-- DEBUG: test landing page clicks -->
        <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
            <button onclick="alert('LANDING DEBUG 1 OK');" style="background:#ff4757;color:#fff;padding:6px 14px;border:none;border-radius:8px;font-size:13px;">DEBUG 1</button>
            <button onclick="alert('LANDING DEBUG 2 OK');" style="background:#00d4ff;color:#0f0c29;padding:6px 14px;border:none;border-radius:8px;font-size:13px;">DEBUG 2</button>
        </div>

        <!-- Settings toggle -->
        <button class="back-btn" id="show-settings-btn" style="margin-top: 1rem; font-size: 0.8rem;">⚙️ 設定 Supabase</button>

        <!-- Settings panel -->
        <div class="settings-panel" id="settings-panel">
            <h3>⚙️ Supabase 設定</h3>
            <div class="config-row">
                <label class="config-label">Supabase URL</label>
                <input type="text" class="config-input" id="cfg-url" placeholder="https://xxxxx.supabase.co" />
            </div>
            <div class="config-row">
                <label class="config-label">Anon Key 或 Service Role Key（troubleshooting 用）</label>
                <input type="password" class="config-input" id="cfg-key" placeholder="xxxx.yyyyyyyyyyyy" />
            </div>
            <button class="save-btn" id="cfg-save-btn">儲存並重新載入</button>
            <div class="config-status" id="cfg-status"></div>
        </div>
    </div>

    <!-- ============ GAME PAGE ============ -->
    <div id="game-page">
        <div class="top-bar">
            <button class="back-btn" id="mp-back-btn">✕ 返回</button>
            <div class="room-info">房間: <span class="room-code" id="mp-room-display"></span></div>
            <div class="status-text" id="mp-connection-status">等待中...</div>
        </div>

        <div class="message-box" id="mp-message"></div>

        <div class="game-container">
            <!-- Left side panel: Hold + Info -->
            <div class="side-panel">
                <div class="preview-box">
                    <div class="preview-label">持有</div>
                    <canvas id="hold-piece-canvas" width="80" height="80"></canvas>
                </div>
                <div class="info-row">
                    <div class="info-item">
                        <span class="info-value" id="mp-score">0</span>
                        <span class="info-label">分數</span>
                    </div>
                    <div class="info-item">
                        <span class="info-value" id="mp-level">1</span>
                        <span class="info-label">等級</span>
                    </div>
                    <div class="info-item">
                        <span class="info-value" id="mp-lines">0</span>
                        <span class="info-label">消行</span>
                    </div>
                </div>
            </div>

            <!-- Main board -->
            <canvas id="mp-canvas"></canvas>

            <!-- Right side panel: Next + Opponent -->
            <div class="side-panel">
                <div class="preview-box">
                    <div class="preview-label">下一個</div>
                    <canvas id="next-piece-canvas" width="80" height="80"></canvas>
                </div>

                <div class="opponent-panel">
                    <div class="mini-title">對手</div>
                    <canvas id="opponent-canvas" width="160" height="160"></canvas>
                    <div class="info-row" style="margin-top: 0.3rem;">
                        <div class="info-item">
                            <span class="info-value" id="mp-other-score" style="font-size: 1rem;">0</span>
                            <span class="info-label">分數</span>
                        </div>
                        <div class="info-item">
                            <span class="info-value" id="mp-other-level" style="font-size: 1rem;">1</span>
                            <span class="info-label">等級</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Touch controls -->
        <div class="touch-controls">
            <div class="ctrl-btn empty"></div>
            <button class="ctrl-btn" id="mp-btn-rotate">↻</button>
            <div class="ctrl-btn empty"></div>
            <button class="ctrl-btn" id="mp-btn-left">◀</button>
            <button class="ctrl-btn" id="mp-btn-down">▼</button>
            <button class="ctrl-btn" id="mp-btn-right">▶</button>
            <div class="ctrl-btn empty"></div>
            <button class="ctrl-btn" id="mp-btn-hold">H</button>
            <div class="ctrl-btn empty"></div>
        </div>
        <div style="margin-top: 0.4rem;">
            <button class="ctrl-btn" id="mp-btn-drop" style="width: 100%; max-width: 280px;">⬇ 直接落下</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/sound.js"></script>
    <script src="js/game-core.js"></script>
    <script src="js/room-system.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/garbage-system.js"></script>
    <script src="js/sync-engine.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/multiplayer-ui.js"></script>

    <script>
        // Bootstrap: determine if we're on the landing or game page
        (function() {
            const landingPage = document.getElementById('landing-page');
            const gamePage = document.getElementById('game-page');
            const settingsPanel = document.getElementById('settings-panel');
            const showSettingsBtn = document.getElementById('show-settings-btn');
            const cfgUrl = document.getElementById('cfg-url');
            const cfgKey = document.getElementById('cfg-key');
            const cfgSaveBtn = document.getElementById('cfg-save-btn');
            const cfgStatus = document.getElementById('cfg-status');
            const bodyEl = document.body;

            function showLanding() {
                if (landingPage) landingPage.style.display = 'flex';
                if (gamePage) gamePage.style.display = 'none';
            }

            function showGame() {
                if (landingPage) landingPage.style.display = 'none';
                if (gamePage) gamePage.style.display = 'flex';
            }

            const isGamePage = window.location.search.includes('roomCode');

            // Load saved Supabase config from localStorage
            function loadSavedConfig() {
                const savedUrl = localStorage.getItem('supabase-url');
                const savedKey = localStorage.getItem('supabase-key');
                if (savedUrl) {
                    cfgUrl.value = savedUrl;
                    bodyEl.dataset.supabaseUrl = savedUrl;
                }
                if (savedKey) {
                    cfgKey.value = savedKey;
                    bodyEl.dataset.supabaseAnonKey = savedKey;
                }
            }

            if (isGamePage) {
                showGame();
                const params = new URLSearchParams(window.location.search);
                const roomCode = params.get('roomCode');
                const roomDisplay = document.getElementById('mp-room-display');
                if (roomDisplay && roomCode) {
                    roomDisplay.textContent = roomCode;
                }
                // Back button
                const backBtn = document.getElementById('mp-back-btn');
                if (backBtn) {
                    backBtn.addEventListener('click', showLanding);
                }
                // Start the multiplayer controller
                MultiplayerGameController.init(null);
            } else {
                showLanding();
                loadSavedConfig();

                // Settings toggle
                if (showSettingsBtn) {
                    showSettingsBtn.addEventListener('click', () => {
                        settingsPanel.classList.toggle('active');
                    });
                }

                // Save config
                if (cfgSaveBtn && cfgUrl && cfgKey && cfgStatus) {
                    cfgSaveBtn.addEventListener('click', () => {
                        const url = cfgUrl.value.trim();
                        const key = cfgKey.value.trim();
                        if (!url || !key) {
                            cfgStatus.textContent = '請填寫完整的 URL 和 Key';
                            cfgStatus.style.color = '#ff4757';
                            return;
                        }
                        localStorage.setItem('supabase-url', url);
                        localStorage.setItem('supabase-key', key);
                        bodyEl.dataset.supabaseUrl = url;
                        bodyEl.dataset.supabaseAnonKey = key;
                        cfgStatus.textContent = '✓ 已儲存！頁面將重新載入。';
                        cfgStatus.style.color = '#00ff87';
                        // Reload to pick up new config
                        setTimeout(() => {
                            location.reload();
                        }, 1000);
                    });
                }

                MultiplayerGameController.init(true);
            }
        })();
    </script>
</body>
</html>
